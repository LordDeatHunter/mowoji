<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Emoji Viewer</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Emoji Viewer</h1>
    <div class="controls">
      <input id="search" aria-label="Search emojis" placeholder="Search emojis..." />
      <label class="nsfw-toggle">
        <input type="checkbox" id="nsfwToggle" />
        <span>Show NSFW</span>
      </label>
    </div>
    <div id="tagFilters" class="tag-filters"></div>
    <div id="emojiCount" class="emoji-count">Showing 0 emojis</div>

    <div id="emojiGrid" class="emoji-grid">
      <div class="no-emojis-message">No emojis available</div>
    </div>
  </body>
</html>
